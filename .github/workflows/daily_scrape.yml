name: Daily Fund Scraper

on:
  schedule:
    - cron: '45 3 * * *' # 9:15 AM IST (UTC: 3:45 AM)
  workflow_dispatch: # Allows manual triggering

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
          
      - name: Run Scraper
        run: python Phase_1/scrape_groww.py
        
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add Phase_1/chroma_db/documents.json
          git commit -m "chore: automated daily scraping of fund data" || echo "No changes to commit"
          git push origin main || git push origin master
